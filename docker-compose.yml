version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: recipes
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database.sql:/docker-entrypoint-initdb.d/schema.sql

  worker:
    build: .
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SUPABASE_URL: http://postgres:5432
      NODE_ENV: development
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  redis_data:
  postgres_data:
